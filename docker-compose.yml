services:
  # ========== 后端 API ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnloop-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://learnloop:learnloop123@mysql:3306/learnloop
      - APP_ENV=production
      - APP_DEBUG=false
      - DEFAULT_MODEL=deepseek-chat
      # 按需填入你的 API Key
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-sk-xxx}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-xxx}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.ppio.cloud/v1}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-xxx}
      - ZHIPU_BASE_URL=${ZHIPU_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      - MIMO_API_KEY=${MIMO_API_KEY:-xxx}
      - MIMO_BASE_URL=${MIMO_BASE_URL:-https://api.mimo.xiaomi.com/v1}
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ========== 前端 ==========
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: learnloop-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ========== MySQL ==========
  mysql:
    image: mysql:8.0
    container_name: learnloop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: learnloop
      MYSQL_USER: learnloop
      MYSQL_PASSWORD: learnloop123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
